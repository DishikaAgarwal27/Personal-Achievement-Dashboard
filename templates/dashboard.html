<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Activity Dashboard</h2>

<a href="/logout" class="btn btn-danger mb-3">Logout</a>

<h4>Add Target</h4>

<form method="POST" class="row g-2 mb-4">

<div class="col">
<input type="text" name="category" class="form-control" placeholder="Activity">
</div>

<div class="col">
<input type="number" name="target" class="form-control" placeholder="Target Hours">
</div>

<div class="col">
<button class="btn btn-primary">Add</button>
</div>

</form>

<table class="table table-bordered">

<tr>
<th>Activity</th>
<th>Target</th>
<th>Completed</th>
<th>Update</th>
</tr>

{% for row in data %}

<tr>

<td>{{row["category"]}}</td>

<td>{{row["target_hours"]}}</td>

<td>{{row["completed_hours"]}}</td>

<td>
<a href="/update/{{row['id']}}" class="btn btn-success btn-sm">+1 Hour</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
